    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap">
    <style>
      :root {
        --body-font-family: "Open Sans", sans-serif;
        --headings-font-family: "Open Sans", sans-serif;
        --page-color: #3d616f;
        --header-color: #4d4d4d;
        --muted-color: #7d7d7d;
        --form-color: #ebedf0;
        --button-color: #df5a2d;
        --field-border: #b0b0b0;
        --background-image: url("https://083950260099-attachments.s3.us-east-2.amazonaws.com/uploads/70519/75c0d743-1940-4788-9ff2-c8ff5a5f06da/bridge.jpg");
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        font-family: var(--body-font-family);
      }

      h1,
      p {
        margin: 0;
      }

      button,
      input {
        font: inherit;
      }

      .page {
        background: var(--page-color);
        box-sizing: border-box;
        color: var(--header-color);
        min-height: 100vh;
        position: relative;
        text-align: center;
        overflow: hidden;
      }

      .background {
        background-color: var(--page-color);
        background-image: var(--background-image);
        background-position: center;
        background-size: cover;
        height: 100%;
        left: 0;
        opacity: 0.5;
        position: absolute;
        top: 0;
        width: 100%;
        z-index: 1;
      }

      .container {
        align-items: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: calc(100vh - 96px);
        position: relative;
        z-index: 2;
      }

      .card {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 2px 34px 0 rgba(51, 51, 51, 0.25);
        display: inline-block;
        flex-shrink: 1;
        margin: 100px auto 40px;
        max-width: 95%;
        min-width: 0;
        padding: 20px 20px 5px;
        width: min(560px, calc(100vw - 60px));
      }

      .avatar {
        border: 7px solid #ffffff;
        border-radius: 50%;
        height: 90px;
        margin: -80px auto 10px;
        overflow: hidden;
        width: 90px;
      }

      .avatar img {
        display: block;
        height: 100%;
        object-fit: cover;
        width: 100%;
      }

      .header {
        color: var(--header-color);
        font-family: var(--headings-font-family);
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .header h1 {
        color: inherit;
        font-size: inherit;
        font-weight: inherit;
        line-height: 1.25;
      }

      .subheader {
        color: var(--muted-color);
        font-size: 15px;
      }

      .play-wrap {
        display: flow-root;
        margin: 25px 0;
        text-align: center;
        width: 100%;
      }

      .play-now {
        background: #ff0000;
        border: 1px solid #ff0000;
        border-radius: 999999px;
        color: #ffffff;
        display: block;
        font-size: 24px;
        line-height: 1.25;
        padding: 18px 32px;
        text-align: center;
        text-decoration: none;
        width: 100%;
      }

      .play-now:hover,
      .play-now:focus {
        filter: brightness(0.96);
      }

      .signup-form {
        background: var(--form-color);
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        margin: 30px -20px -20px;
        min-width: 0;
        padding: 20px 20px 5px;
      }

      .title {
        color: var(--header-color);
        font-size: 18px;
        margin-bottom: 30px;
      }

      .title p {
        color: inherit;
        font-size: inherit;
        line-height: 1.45;
        text-align: center;
      }

      .title .blank {
        min-height: 26px;
      }

      .alert {
        background: #d3fbeb;
        border: 1px solid #10bf7a;
        border-radius: 5px;
        color: #0c905c;
        display: none;
        list-style: none;
        margin: 25px auto;
        padding: 12px;
        text-align: center;
        width: 100%;
      }

      .alert.is-visible {
        display: block;
      }

      .fields {
        display: flex;
        flex-wrap: wrap;
        margin: 0 -5px;
        min-width: 0;
      }

      .field {
        flex: 100 1 auto;
        margin: 0 5px 15px;
        min-width: 0;
      }

      .input {
        background: transparent;
        border: 1px solid var(--field-border);
        border-radius: 5px;
        color: #000000;
        line-height: 1.4;
        margin: 0;
        min-width: 0;
        padding: 12px;
        width: 100%;
      }

      .input:focus {
        border-color: #1677be;
        outline: none;
      }

      .input::placeholder {
        color: inherit;
        opacity: 0.8;
      }

      .submit {
        background: var(--button-color);
        border: 0;
        border-radius: 5px;
        color: #ffffff;
        cursor: pointer;
        flex: 1 100 auto;
        font-weight: 700;
        margin: 0 5px 15px;
        min-width: 0;
        overflow: hidden;
        padding: 0;
        position: relative;
        text-align: center;
      }

      .submit span {
        display: block;
        padding: 12px 24px;
        transition: background-color 300ms ease-in-out;
      }

      .submit:hover span,
      .submit:focus span {
        background: rgba(0, 0, 0, 0.1);
      }

      .disclaimer {
        color: #666666;
        font-size: 12px;
        margin-top: 10px;
      }

      .powered-by {
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 30px 0;
        position: relative;
        width: 100%;
        z-index: 5;
      }

      .powered-by a {
        color: #ffffff;
        display: inline-block;
        font-size: 13px;
        font-weight: 700;
        opacity: 0.95;
        text-decoration: none;
      }

      .powered-by a:hover,
      .powered-by a:focus {
        opacity: 1;
        transform: scale(1.025);
      }

      @media (min-width: 500px) {
        .card {
          padding: 40px;
        }

        .signup-form {
          margin: 30px -40px -40px;
          padding: 22px 40px 25px;
        }

        .field {
          min-width: 275px;
        }
      }

      @media (max-width: 430px) {
        .card {
          margin-top: 86px;
          max-width: calc(100vw - 60px);
          padding-left: 16px;
          padding-right: 16px;
          width: calc(100vw - 60px);
        }

        .play-now {
          font-size: 22px;
          padding-left: 22px;
          padding-right: 22px;
        }

        .title {
          font-size: 17px;
          margin-left: auto;
          margin-right: auto;
          max-width: 300px;
        }

        .signup-form {
          margin-left: -16px;
          margin-right: -16px;
          padding-left: 16px;
          padding-right: 16px;
        }

        .fields {
          display: block;
          margin: 0;
        }

        .field,
        .submit {
          display: block;
          margin-left: 0;
          margin-right: 0;
          width: 100%;
        }
      }
    </style>

  <body>
    <main class="page">
      <div class="background" aria-hidden="true"></div>
      <div class="container">
        <section class="card" aria-label="CHICKEN ROAD GAME">
          <div class="avatar">
            <img src="https://embed.filekitcdn.com/e/rbNhUsr4RNsQhxwF4XRjTU/uqGE3DbxH2CpxTZsqjheuV" alt="">
          </div>
          <div class="header">
            <h1>CHICKEN ROAD GAME</h1>
          </div>
          <div class="subheader">
            <div class="play-wrap">
              <a class="play-now" href="https://refpa3665.com/L?tag=d_497503m_126157c_&amp;site=497503&amp;ad=126157" target="_blank" rel="noopener noreferrer">
                <strong>PLAY NOW</strong>
              </a>
            </div>
            <p>&#8203;</p>
          </div>
          <form class="signup-form" id="signup-form">
            <div class="title">
              <p class="blank">&#8203;</p>
              <p class="blank">&#8203;</p>
              <p class="blank">&#8203;</p>
              <p>Subscribe to Lauren's weekly newsletter on design, marketing, and creativity.</p>
            </div>
            <div class="alert" id="success-message" role="status">Success! Now check your email to confirm your subscription.</div>
            <div class="fields">
              <div class="field">
                <input class="input" name="email_address" placeholder="Email Address" aria-label="Email Address" required type="email">
              </div>
              <button class="submit" type="submit">
                <span>Subscribe</span>
              </button>
            </div>
            <div class="disclaimer">We respect your privacy. Unsubscribe at any time.</div>
          </form>
        </section>
      </div>
      <div class="powered-by">
        <a href="https://kit.com/features/forms" rel="nofollow noopener noreferrer" target="_blank">Powered By Kit</a>
      </div>
    </main>
    <script>
      const form = document.getElementById("signup-form");
      const success = document.getElementById("success-message");

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        success.classList.add("is-visible");
        form.reset();
      });
    </script>
  </body>
</html>
